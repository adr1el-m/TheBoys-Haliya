name: Mirror to Repo B

on:
  push:
    branches:
      - "**"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is loaded
        run: |
          if [ -z "${{ secrets.MIRROR }}" ]; then
            echo "SECRET IS EMPTY - not loaded"
          else
            echo "SECRET IS LOADED - length OK"
          fi

      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Repo B
        env:
          MIRROR: ${{ secrets.MIRROR }}
        run: |
          git remote add target https://x-access-token:${MIRROR}@github.com/winterwind999/theboys-haliya.git
          git push target --mirror
