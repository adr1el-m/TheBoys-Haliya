name: Mirror to Repo B

on:
  push:
    branches:
      - "**"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Repo B
        run: |
          git remote add target https://winterwind999:${{ secrets.MIRROR }}@github.com/winterwind999/theboys-haliya.git
          git push target --mirror
