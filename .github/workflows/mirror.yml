name: Mirror to Repo B

on:
  push:
    branches:
      - "**" # triggers on ALL branches

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # REQUIRED: fetches all commits, not just the latest

      - name: Push mirror to Repo B
        run: |
          git remote add target https://x-access-token:${{ secrets.MIRROR }}@github.com/winterwind999/theboys-haliya.git
          git push target --mirror
